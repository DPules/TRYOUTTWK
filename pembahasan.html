<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pembahasan Soal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f5f6fa;
        padding: 20px;
      }

      .container {
        max-width: 800px;
        margin: auto;
      }

      .soal {
        background: white;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 12px;
        border-left: 5px solid #c00000;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }

      .benar {
        color: green;
      }
      .salah {
        color: red;
      }

      button {
        margin-top: 20px;
        padding: 10px;
        border: none;
        background: #c00000;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Pembahasan Soal TIU</h2>
      <div id="isi"></div>

      <button onclick="kembali()">Kembali</button>
    </div>

    <script>
      const soal = JSON.parse(localStorage.getItem("bankSoal"));
      const jawaban = JSON.parse(localStorage.getItem("jawabanUser"));

      let html = "";

      soal.forEach((s, i) => {
        let user = jawaban[i];
        let kunci = s.j;

        let status = user == kunci ? "benar" : "salah";

        html += `
      <div class="soal">
        <p><b>${i + 1}. ${s.t}</b></p>

        <p>Jawaban kamu: <b>${user != null ? s.p[user] : "-"}</b></p>
        <p>Kunci: <b>${s.p[kunci]}</b></p>

        <p class="${status}">
          ${status === "benar" ? "BENAR ✅" : "SALAH ❌"}
        </p>

        <p><b>Pembahasan:</b><br>${s.e}</p>
      </div>
      `;
      });

      document.getElementById("isi").innerHTML = html;

      function kembali() {
        window.history.back();
      }
    </script>
  </body>
</html>
